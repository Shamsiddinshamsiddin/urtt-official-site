<!DOCTYPE html>
<html lang="uz">
<head>
    <!-- MANA SHU YER -> HEAD QISMINING BOSHLANISHI -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urganch Raqamli Texnologiyalar Texnikumi</title>
    
    <!-- CSS faylingizni shu yerda ulaysiz -->
    <link rel="stylesheet" href="style.css">
    <!-- HEAD QISMINING YOPILISHI -->
</head>
<body>

    <!-- Navigatsiya paneli (Navbar) -->
    <nav>
        <div class="logo">URTT</div>
    </nav>

    <!-- Asosiy Hero bo'limi va Telegram Forma -->
    <section class="hero">
        <h1>Raqamli Kelajakni Biz Bilan Quring!</h1>
        <p>Urganch shahridagi eng zamonaviy IT-texnikum — Xorazmning raqamli iqtidorlar markazi.</p>
        
        <!-- Telegram botga ulangan forma -->
        <form id="telegram-form">
            <input type="text" id="userName" placeholder="Ismingiz" required>
            <input type="tel" id="userPhone" placeholder="Telefon raqamingiz" required>
            <button type="submit">Ariza topshirish</button>
        </form>
    </section>

    <!-- JavaScript faylingizni ulash (Body tugashidan oldin) -->
    <script src="app.js"></script>
</body>
</html>
